# SubBuddy — Codex CLI プロジェクトスコープ設定
#
# これは project-scoped config（.codex/config.toml）。
# 重要: このファイルは「移行先で当該プロジェクトが trusted」の場合のみ読み込まれる。
#   未設定だと config・hooks・rules がすべてスキップされる（Codexレビュー指摘）。
#   trust 設定はグローバル側 ~/.codex/config.toml に書く（migration-notes.md 参照）:
#     [projects."/絶対パス/SubBuddy"]
#     trust_level = "trusted"
#
# project-scoped config は machine-local の provider/auth/notification/telemetry 等は上書き不可。
#
# 各セクションは移行タスクで段階追記する。

# --- 承認 / サンドボックス（T-7 / D-7） ---
# DevContainer が隔離境界。値は移行先の運用実績に合わせて確定する。
# approval_policy: untrusted | on-request | never
# sandbox_mode:   read-only | workspace-write | danger-full-access
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# --- MCP サーバ（T-6 / D-6） ---
# 秘密情報は env テーブルに直書きせず env_vars（ホスト環境変数の許可リスト）で間接参照。
# ${VAR} 展開は Codex 仕様に無いため使わない。移行先で env を注入（migration-notes.md）。
# 旧 .mcp.json の stitch 平文キーは除去済み（Q-2 でローテーション）。

[mcp_servers.obsidian]
command = "npx"
args = ["@bitbonsai/mcpvault@latest", "/workspaces/vault"]

[mcp_servers.stitch]
command = "npx"
args = ["@_davideast/stitch-mcp", "proxy"]
env_vars = ["STITCH_API_KEY"]

[mcp_servers.google-slides]
command = "node"
args = ["/workspaces/SubBuddy/.tools/google-slides-mcp/dist/index.js"]

[mcp_servers.napkin-ai]
command = "npx"
args = ["-y", "napkin-ai-mcp"]
env_vars = ["NAPKIN_API_KEY"]

[mcp_servers.napkin-ai.env]
NAPKIN_STORAGE_TYPE = "local"
NAPKIN_STORAGE_LOCAL_DIR = "./visuals"
NAPKIN_DEFAULT_FORMAT = "svg"
NAPKIN_DEFAULT_LANGUAGE = "ja"
NAPKIN_DEFAULT_COLOR_MODE = "light"

# --- Hook ---
# .codex/hooks/hooks.json に分離（PostToolUse matcher=Edit|Write → detect-bolt-complete）。
# 入力は stdin JSON。${CLAUDE_PROJECT_DIR} は存在しないため command 側で $(git rev-parse --show-toplevel) を使う。

# --- サブエージェント（T-3 / D-3） ---
# 定義は .codex/agents/*.toml に分離（明示起動のみ。自動ディスパッチは無い）。

# --- メモリ（要確認: トップレベル memories.* キーの有無と挙動を Phase A 着手前に検証） ---
# config-reference に memories.* キーが存在。Q-3 の運用方式に影響しうるため実機確認する。
